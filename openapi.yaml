openapi: 3.1.0
info:
  title: RAG Agent API
  version: 1.0.0
  description: API for querying a Supabase-backed RAG knowledge base.
servers:
  - url: https://YOUR-DEPLOYED-DOMAIN.com
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
  /ask:
    post:
      operationId: askQuestion
      summary: Ask a question against the knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                  description: User question
                show_sources:
                  type: boolean
                  description: Whether to include retrieved chunks
                  default: false
              required:
                - question
      responses:
        "200":
          description: Successful answer
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        chunk_id:
                          type: string
                        document_id:
                          type: string
                        text_content:
                          type: string
                        similarity:
                          type: number